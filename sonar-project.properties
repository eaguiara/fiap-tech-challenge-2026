# SonarQube Project Configuration
# GarageFlowService - Clean Architecture Analysis

# Project Information
sonar.projectKey=garageflow-service
sonar.projectName=GarageFlowService
sonar.projectVersion=1.0.0

# Source Code Location
sonar.sources=src

# Exclusions - Focus on Domain + Application layers only
# Exclude API layer (controllers, routing, HTTP concerns)
sonar.exclusions=src/GarageFlowService.API/**

# Exclude Infrastructure layer (data access, external dependencies)
sonar.exclusions=src/GarageFlowService.API/**,src/GarageFlowService.Infrastructure/**

# Test File Patterns
sonar.tests=src/tests

# Exclude tests from API and Infrastructure analysis
sonar.test.exclusions=src/tests/GarageFlowService.Tests/API/**,src/tests/GarageFlowService.Tests/Infrastructure/**

# Code Coverage Configuration
# Using OpenCover format for Coverlet integration
sonar.cs.opencover.reportsPaths=coverage.opencover.xml

# C# Language Configuration
sonar.language=cs

# Code Analysis Settings
sonar.cpd.cross_project=true

# Architecture Focus
# This configuration ensures analysis focuses on:
# - Domain layer: Business logic and entities
# - Application layer: Use cases, commands, queries, handlers
#
# Excluded from analysis:
# - API layer: Controllers, routing, HTTP configuration
# - Infrastructure layer: EF Core context, repositories, data access
#
# Rationale: Code coverage metrics should reflect business logic coverage,
# not infrastructure implementation details
