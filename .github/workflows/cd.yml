name: Deploy on EKS
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  run-kubectl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.EKS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.EKS_SECRET_KEY }}
          aws-region: us-east-2
      - name: update kubeconfig
        run: aws eks update-kubeconfig --region us-east-2 --name garage_flow_eks
      - name: deploy to eks
        run: kubectl apply -f k8s/
      - name: restart deployment
        run: kubectl rollout restart garage-flow-deployment -n garage-flow-namespace
