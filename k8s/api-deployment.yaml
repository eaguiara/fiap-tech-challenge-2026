apiVersion: apps/v1
kind: Deployment
metadata:
  name: garageflow-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: garageflow-api
  template:
    metadata:
      labels:
        app: garageflow-api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/garageflowservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: garageflow-config
            - secretRef:
                name: garageflow-secrets
          readinessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi