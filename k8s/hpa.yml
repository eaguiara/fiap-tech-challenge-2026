apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: garage-flow-hpa
  namespace: garage-flow-namespace
spec:
  scaleTargetRef:
    name: garage-flow-deployment
    kind: Deployment
    apiVersion: apps/v1
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
